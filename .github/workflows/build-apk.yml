name: Build APK Android
on:
  workflow_dispatch:
jobs:
  build:
    name: Build APK com Gradle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Instalar dependências
        run: cd artifacts/cenas-uso-bras && pnpm install
      - name: Decodificar keystore
        run: echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 --decode > artifacts/cenas-uso-bras/android/app/release.keystore
      - name: Build APK
        run: |
          cd artifacts/cenas-uso-bras/android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon
        env:
          KEYSTORE_PATH: release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: cenas-uso-bras-release
          path: artifacts/cenas-uso-bras/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30